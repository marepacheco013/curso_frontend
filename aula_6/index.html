<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<link rel="stylesheet" href="./css/style.css">
<body>
    <!-- DIV que centraliza toda a galeria -->
    <div class="gallery-conteiner">
        <h1>Galeria de Viagens</h1>

        <!-- GRID da galeria -->
         <!-- Conteiner flex que usa o flex-wrapper para criar um grid responsivel, usando flexbox -->
        <div class="grid">

            <div class="item">
                <!-- imagem do item -->
                <img src="./IMG/paris.png" alt="Paris">
                <!-- Overlay: camada de teto sobre a imagem -->
                 <div class="Overlay">Paris</div>
            </div>

            <!-- ITEM 2 -->
            <div class="item">
                <img src="./IMG/newyork.png" alt="">
                <div class="Overlay"> New York</div>
            </div>

            <!-- ITEM 3 -->
             <div class="item">
                <img src="./IMG/japao.png" alt="">
                <div class="Overlay"> Japão </div>
            </div>

            <!-- ITEM 4 -->
             <div class="item">
                <img src="./IMG/tailandia.png" alt="">
                <div class="Overlay"> Tailandia</div>
            </div>

            <!-- ITEM 5 -->
             <div class="item">
                <img src="./IMG/italia.png" alt="">
                <div class="Overlay"> Italia </div>
            </div>

            <!-- ITEM 6 -->
             <div class="item">
                <img src="./IMG/londres.png" alt="">
                <div class="Overlay"> Londres</div>
            
            </div>
        

    </div>
    
</body>
</html>
