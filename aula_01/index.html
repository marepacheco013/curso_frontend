<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aula 01 - Página de Boas Vindas</title>
    <!-- link que liga a pagina html ao arquivo css e aolica os estilos visuais -->
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>
    <!-- cabeçalho do nosso site (HEADER) -->
     <!-- sessão semantica usada para titulos principais e conteudo do topo -->
    <header>
        <!-- titulo principal (ha1) que deve ter apenas UM POR PAGINA -->
        <h1>Bem vindos ao nosso Curso!</h1>
    </header>
    <!-- conteudo principal-->
     <!-- sessão semantica para o conteudo central/principal da pagina -->
    <main>
        <!-- a propriedade scr é o caminho da imagem e o alt seria o texto alternativo que irá aparecer caso ela falhe -->
        <img src="./img/letras-de-boas-vindas-coloridas-bandeira-moderna-para-convite_1017-50216.avif" alt="imagem de boas vindas">
        <p> estamos muito felizes em ter você aqui!!
            prepare-se para mergulhar no mundo do desenvolvimento web!</p>
            <!-- a tag é usada para redirecionar para outra pagina ou arquivo -->
            <a class="button" href="#">começar agora!</a>
    </main>
    <!-- rodapé da pagina (footer) -->
     <!-- sessão semantica para informações semanticas de rodapé (copyrigth) -->
     <footer>
        <p>&copy;2026 desenvolvido por Mariana Pacheco em aula de HTML E CSS no Senac Lapa Tito</p>
     </footer>
</body>
</html
